[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "hackathon-jupyter-persona"
version = "0.1.0"
description = "GoodBot - A Jupyter AI persona for clinical data extraction hackathon"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "jupyter-ai-persona-manager",
    "jupyterlab-chat",
    "langchain>=0.3.0",
    "langchain-community>=0.3.0",
    "langgraph>=0.6.0",
    "langgraph-checkpoint-sqlite",
    "openai>=1.0.0",
    "pydantic-settings>=2.0",
    "jinja2>=3.0",
    "litellm>=1.0.0",
    "duckduckgo-search>=4.0",
    "aiosqlite>=0.20",
]

[project.entry-points."jupyter_ai.personas"]
goodbot = "goodbot.persona:GoodBotPersona"

[tool.hatch.build.targets.wheel]
packages = ["src/goodbot"]
